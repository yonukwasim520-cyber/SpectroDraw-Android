<!DOCTYPE html>
<html>
<head>

<title>SpectroDraw</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
    background:#202124;
    color:white;
    font-family:Arial;
    text-align:center;
}


canvas{
    background:white;
    border:2px solid #555;
    touch-action:none;
}


#draw{
    width:95%;
    max-width:511px;
}


#preview{
    width:256px;
    height:256px;
}


button, textarea{
    margin:5px;
    padding:12px;
    font-size:16px;
}


textarea{
    width:80%;
    height:100px;
}


.mode{
    display:none;
}


.active{
    display:block;
}


a{
    color:white;
    background:#444;
    padding:12px;
    display:inline-block;
    text-decoration:none;
}


</style>

</head>


<body>


<h1>SpectroDraw</h1>



<button onclick="showDraw()">
✏️ Draw Mode
</button>


<button onclick="showText()">
⌨️ Text Mode
</button>





<div id="drawMode" class="mode active">


<h2>Draw</h2>


<canvas id="draw"
width="511"
height="324">
</canvas>


<br>


<button id="clear">
Clear
</button>


<button id="convert">
Convert Drawing
</button>


</div>






<div id="textMode" class="mode">


<h2>Text</h2>


<textarea id="textInput"
placeholder="Write something...">
</textarea>


<br>


<button id="convertText">
Convert Text
</button>


</div>








<h2>Audio Spectrogram Preview</h2>


<canvas id="preview"
width="256"
height="256">
</canvas>



<br>


<audio id="player"
controls>
</audio>



<br>


<a id="download"
style="display:none"
download="spectro.wav">

Download WAV

</a>







<script>


// =====================
// Mode Switch
// =====================


function showDraw(){

    document
    .getElementById("drawMode")
    .className="mode active";


    document
    .getElementById("textMode")
    .className="mode";

}



function showText(){

    document
    .getElementById("drawMode")
    .className="mode";


    document
    .getElementById("textMode")
    .className="mode active";

}









// =====================
// Drawing
// =====================


const canvas =
document.getElementById("draw");


const ctx =
canvas.getContext("2d");



ctx.fillStyle="white";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);



let drawing=false;



function position(e){

    let r =
    canvas.getBoundingClientRect();


    let x;
    let y;


    if(e.touches){

        x=e.touches[0].clientX-r.left;
        y=e.touches[0].clientY-r.top;

    }else{

        x=e.clientX-r.left;
        y=e.clientY-r.top;

    }


    return {

        x:x*canvas.width/r.width,

        y:y*canvas.height/r.height

    };

}



function start(e){

    e.preventDefault();

    drawing=true;


    let p=position(e);


    ctx.beginPath();

    ctx.moveTo(
        p.x,
        p.y
    );

}



function move(e){

    if(!drawing)
        return;


    e.preventDefault();


    let p=position(e);


    ctx.strokeStyle="black";

    ctx.lineWidth=6;

    ctx.lineCap="round";


    ctx.lineTo(
        p.x,
        p.y
    );


    ctx.stroke();


    ctx.beginPath();


    ctx.moveTo(
        p.x,
        p.y
    );

}



function stop(){

    drawing=false;

    ctx.beginPath();

}



canvas.onmousedown=start;
canvas.onmousemove=move;
canvas.onmouseup=stop;


canvas.ontouchstart=start;
canvas.ontouchmove=move;
canvas.ontouchend=stop;





document
.getElementById("clear")
.onclick=function(){


ctx.fillStyle="white";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);


};







function getPixels(){


let img =
ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);


let pixels=[];



for(
let y=0;
y<canvas.height;
y++
){


let row=[];


for(
let x=0;
x<canvas.width;
x++
){


let i =
(
y*canvas.width+x
)*4;



row.push(
img.data[i]<100
?1
:0
);


}


pixels.push(row);


}



return pixels;


}








// =====================
// Spectrogram
// =====================


function showSpectrogram(data){


let c =
document.getElementById("preview");


let p =
c.getContext("2d");



p.fillStyle="white";

p.fillRect(
0,
0,
256,
256
);



let h=data.length;

let w=data[0].length;


let max=0;



for(let y=0;y<h;y++){

for(let x=0;x<w;x++){

max=Math.max(
max,
data[y][x]
);

}

}




for(let y=0;y<h;y++){

for(let x=0;x<w;x++){


let value =
data[y][x]/max;



if(value>0.05){


let c =
Math.floor(
value*255
);



p.fillStyle =
"rgb("+
c+
","+
c+
","+
c+
")";



p.fillRect(

x*256/w,

255-y*256/h,

256/w+1,

256/h+1

);


}


}


}



}







function updateResult(data){


console.log(data);



if(data.spectrogram){

showSpectrogram(
data.spectrogram
);

}



if(data.file){


let player =
document.getElementById("player");


player.src=data.file;



let download =
document.getElementById("download");


download.href=data.file;


download.style.display="inline-block";


}


}









// =====================
// Drawing Convert
// =====================


document
.getElementById("convert")
.onclick=async()=>{


let response =
await fetch(
"/capture",
{


method:"POST",


headers:{
"Content-Type":
"application/json"
},


body:
JSON.stringify({

pixels:
getPixels()

})


}
);



let data =
await response.json();



updateResult(data);


};








// =====================
// Text Convert
// =====================


document
.getElementById("convertText")
.onclick=async()=>{


let text =
document
.getElementById("textInput")
.value;



let response =
await fetch(
"/text",
{


method:"POST",


headers:{
"Content-Type":
"application/json"
},


body:
JSON.stringify({

text:text

})


}
);



let data =
await response.json();



updateResult(data);


};




</script>


</body>
</html>
