<!DOCTYPE html>
<html>
<head>

<title>SpectroDraw</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{

    background:#222;
    color:white;
    font-family:Arial;
    text-align:center;

}


canvas{

    background:white;
    border:2px solid #555;
    touch-action:none;

}


#draw{

    width:95%;
    max-width:511px;

}


#preview{

    width:256px;
    height:256px;

}


button,a{

    padding:12px;
    margin:5px;
    font-size:16px;

}


a{

    background:#444;
    color:white;
    text-decoration:none;
    display:inline-block;

}


</style>

</head>


<body>


<h1>SpectroDraw</h1>



<canvas id="draw"
width="511"
height="324">
</canvas>



<br>


<button id="clear">
Clear
</button>


<button id="convert">
Convert To Audio
</button>



<h2>Audio Spectrogram Preview</h2>



<canvas id="preview"
width="256"
height="256">
</canvas>



<br>


<audio id="player" controls></audio>


<br>


<a id="download"
download="drawing.wav"
style="display:none">

Download WAV

</a>






<script>


const drawCanvas =
document.getElementById("draw");


const ctx =
drawCanvas.getContext("2d");



ctx.fillStyle="white";


ctx.fillRect(
0,
0,
drawCanvas.width,
drawCanvas.height
);



let drawing=false;





function getPosition(e){


    let rect =
    drawCanvas.getBoundingClientRect();


    let x;
    let y;



    if(e.touches){


        x =
        e.touches[0].clientX -
        rect.left;


        y =
        e.touches[0].clientY -
        rect.top;


    }
    else{


        x =
        e.clientX -
        rect.left;


        y =
        e.clientY -
        rect.top;


    }



    return {

        x:
        x *
        drawCanvas.width /
        rect.width,


        y:
        y *
        drawCanvas.height /
        rect.height

    };


}







function startDraw(e){

    e.preventDefault();

    drawing=true;


    let p =
    getPosition(e);


    ctx.beginPath();

    ctx.moveTo(
        p.x,
        p.y
    );

}




function draw(e){


    if(!drawing)
        return;


    e.preventDefault();


    let p =
    getPosition(e);



    ctx.strokeStyle="black";

    ctx.lineWidth=6;

    ctx.lineCap="round";



    ctx.lineTo(
        p.x,
        p.y
    );


    ctx.stroke();



    ctx.beginPath();


    ctx.moveTo(
        p.x,
        p.y
    );


}




function stopDraw(e){

    e.preventDefault();

    drawing=false;

    ctx.beginPath();

}






drawCanvas.addEventListener(
"mousedown",
startDraw
);


drawCanvas.addEventListener(
"mousemove",
draw
);


drawCanvas.addEventListener(
"mouseup",
stopDraw
);



drawCanvas.addEventListener(
"touchstart",
startDraw
);


drawCanvas.addEventListener(
"touchmove",
draw
);


drawCanvas.addEventListener(
"touchend",
stopDraw
);






document.getElementById(
"clear"
).onclick=function(){


    ctx.fillStyle="white";


    ctx.fillRect(
        0,
        0,
        drawCanvas.width,
        drawCanvas.height
    );


};








function getPixels(){


    let image =
    ctx.getImageData(
        0,
        0,
        drawCanvas.width,
        drawCanvas.height
    );


    let pixels=[];



    for(
        let y=0;
        y<drawCanvas.height;
        y++
    ){


        let row=[];



        for(
            let x=0;
            x<drawCanvas.width;
            x++
        ){


            let i =
            (
                y *
                drawCanvas.width +
                x
            ) * 4;



            row.push(
                image.data[i] < 100
                ? 1
                : 0
            );


        }


        pixels.push(row);


    }



    return pixels;

}









// ===========================
// Draw Real Spectrogram
// ===========================


function showSpectrogram(data){


    const canvas =
    document.getElementById(
        "preview"
    );


    const pctx =
    canvas.getContext(
        "2d"
    );



    pctx.fillStyle="white";


    pctx.fillRect(
        0,
        0,
        256,
        256
    );



    let height =
    data.length;


    let width =
    data[0].length;



    let max=0;



    for(
        let y=0;
        y<height;
        y++
    ){


        for(
            let x=0;
            x<width;
            x++
        ){


            if(
                data[y][x]>max
            )

                max=data[y][x];


        }


    }





    for(
        let y=0;
        y<height;
        y++
    ){


        for(
            let x=0;
            x<width;
            x++
        ){



            let value =
            data[y][x]/max;



            if(value>0.05){



                let c =
                Math.floor(
                    value*255
                );



                pctx.fillStyle =
                "rgb("+
                c+
                ","+
                c+
                ","+
                c+
                ")";



                pctx.fillRect(

                    x*256/width,

                    255 -
                    y*256/height,

                    256/width+1,

                    256/height+1

                );


            }


        }


    }


}








document.getElementById(
"convert"
).onclick=async()=>{


    let pixels =
    getPixels();



    let response =
    await fetch(
        "/capture",
        {


            method:"POST",


            headers:{

                "Content-Type":
                "application/json"

            },


            body:
            JSON.stringify({

                pixels:pixels

            })


        }
    );



    let data =
    await response.json();



    console.log(data);




    if(data.spectrogram){


        showSpectrogram(
            data.spectrogram
        );


    }






    if(data.file){



        document.getElementById(
            "player"
        ).src =
        data.file;



        let download =
        document.getElementById(
            "download"
        );



        download.href =
        data.file;



        download.style.display =
        "inline-block";


    }



};



</script>


</body>
</html>
